---
name: rk3588-qualification

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full commit SHA from main to build and qualify
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hardware-rk3588
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  BUILDX_VERSION: v0.35.0
  # yamllint disable-line rule:line-length
  BUILDKIT_IMAGE: moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a
  # yamllint disable-line rule:line-length
  TRIVY_IMAGE: aquasec/trivy:0.72.0@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require an immutable commit already in main
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          git merge-base --is-ancestor "${SOURCE_SHA}" origin/main

  qualify:
    needs: prepare
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.prepare.result == 'success'
    runs-on:
      - self-hosted
      - linux
      - robotics-rk3588
    environment:
      name: accelerator-rk3588
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      COMPOSE_PROJECT_NAME: hardware-rk3588-${{ github.run_id }}-${{ github.run_attempt }}
      ROBOTICS_RKNN_DEVICE: ${{ vars.ROBOTICS_RKNN_DEVICE }}
      SOURCE_SHA: ${{ inputs.source_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: |
            image=${{ env.BUILDKIT_IMAGE }}
      - name: Validate the RK3588 host
        run: |
          test "$(uname -m)" = aarch64
          ROBOTICS_RKNN_DEVICE="${ROBOTICS_RKNN_DEVICE:-/dev/dri/renderD129}"
          test -c "${ROBOTICS_RKNN_DEVICE}"
          ROBOTICS_RKNN_RENDER_GID="$(stat -c '%g' "${ROBOTICS_RKNN_DEVICE}")"
          tr -d '\0' < /proc/device-tree/compatible \
            > artifacts-compatible.txt
          grep -qi 'rockchip,rk3588' artifacts-compatible.txt
          mkdir -p artifacts/hardware
          {
            echo "device=${ROBOTICS_RKNN_DEVICE}"
            echo "render_gid=${ROBOTICS_RKNN_RENDER_GID}"
            echo "compatible=$(cat artifacts-compatible.txt)"
            uname -a
          } > artifacts/hardware/device.txt
          rm artifacts-compatible.txt
          {
            echo "ROBOTICS_RKNN_DEVICE=${ROBOTICS_RKNN_DEVICE}"
            echo "ROBOTICS_RKNN_RENDER_GID=${ROBOTICS_RKNN_RENDER_GID}"
          } >> "${GITHUB_ENV}"
      - name: Build the local-only conformance image
        run: |
          created="$(git show --no-patch --format=%cI "${SOURCE_SHA}")"
          epoch="$(git show --no-patch --format=%ct "${SOURCE_SHA}")"
          image=local/robotics-runtime-infra/provider-conformance-rknn-rk3588:${SOURCE_SHA}
          IMAGE_CREATED="${created}" \
          SOURCE_DATE_EPOCH="${epoch}" \
          VCS_REF="${SOURCE_SHA}" \
          VERSION="${SOURCE_SHA}" \
            docker buildx bake provider-conformance-rknn-rk3588 \
              --load \
              --set '*.platform=linux/arm64' \
              --set "provider-conformance-rknn-rk3588.tags=${image}"
          echo "RKNN_CONFORMANCE_IMAGE=${image}" >> "${GITHUB_ENV}"
          docker image inspect "${image}" \
            > artifacts/hardware/image-inspect.json
      - name: Scan and inventory the local image
        run: |
          mkdir -p .trivy-cache
          trivy=(
            docker run --rm
            --volume /var/run/docker.sock:/var/run/docker.sock
            --volume "${PWD}:/work:ro"
            --volume "${PWD}/artifacts/hardware:/reports"
            --volume "${PWD}/.trivy-cache:/root/.cache/trivy"
            "${TRIVY_IMAGE}" image
          )
          "${trivy[@]}" \
            --format cyclonedx \
            --output /reports/sbom.cdx.json \
            "${RKNN_CONFORMANCE_IMAGE}"
          "${trivy[@]}" \
            --config /work/trivy.yaml \
            --ignorefile /work/.trivyignore \
            --skip-db-update --ignore-unfixed \
            --severity HIGH,CRITICAL --exit-code 1 \
            "${RKNN_CONFORMANCE_IMAGE}"
      - name: Run the official RKNN hardware fixture
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.rknn.yaml \
            --profile rknn-rk3588 \
            run --rm --no-deps --no-build \
            provider-conformance-rknn-rk3588 \
            2>&1 | tee artifacts/hardware/conformance.log
          test -s artifacts/hardware/conformance.log
      - name: Remove local-only runtime resources
        if: always()
        run: |
          docker compose \
            -f compose.yaml \
            -f compose.rknn.yaml \
            --profile rknn-rk3588 \
            down --volumes --remove-orphans || true
          if [[ -n "${RKNN_CONFORMANCE_IMAGE:-}" ]]; then
            docker image rm "${RKNN_CONFORMANCE_IMAGE}" || true
          fi
      - name: Upload qualification evidence without the vendor image
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: hardware-rk3588-${{ inputs.source_sha }}
          path: artifacts/hardware/
          if-no-files-found: warn
          retention-days: 14
