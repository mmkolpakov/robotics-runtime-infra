---
name: ci

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read
  security-events: write

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Validate contracts and YAML
        run: make RUN_ID=ci-validate validate
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: validation-reports
          path: runs/

  docker-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Lint Dockerfile and workflows
        run: make lint
      - name: Inspect upstream image manifests
        run: make docker-manifests
      - name: Build simulation image
        run: |
          IMAGE_CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          IMAGE_SOURCE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
          IMAGE_VERSION="${GITHUB_SHA}" \
          VCS_REF="${GITHUB_SHA}" \
          IMAGE_TAG="robotics/ros-jazzy-simulation:ci" \
            make compose-build
      - name: Smoke simulation image
        run: |
          IMAGE_TAG="robotics/ros-jazzy-simulation:ci" \
          RUN_ID="ci-${GITHUB_RUN_ID}" \
            make \
              compose-smoke \
              compose-sensor-smoke \
              compose-artifact-tooling-smoke \
              integration-smoke \
              joint-motion-smoke \
              compose-autopilot-smoke
      - name: Parallel isolation smoke
        run: IMAGE_TAG="robotics/ros-jazzy-simulation:ci" RUN_ID="ci-${GITHUB_RUN_ID}-iso" make parallel-isolation-smoke
      - name: Inspect local image metadata
        run: IMAGE_TAG="robotics/ros-jazzy-simulation:ci" RUN_ID="ci-${GITHUB_RUN_ID}" make docker-metadata
      - name: Check recorded package versions
        run: RUN_ID="ci-${GITHUB_RUN_ID}" make docker-update-check
      - name: Generate image vulnerability report
        run: IMAGE_TAG="robotics/ros-jazzy-simulation:ci" RUN_ID="ci-${GITHUB_RUN_ID}" make security-scan
      - name: Upload Trivy SARIF
        if: github.event_name == 'push' && vars.ENABLE_CODE_SCANNING == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: runs/ci-${{ github.run_id }}/security/trivy-image.sarif
          category: trivy-image
      - name: Apply vulnerability gate
        run: IMAGE_TAG="robotics/ros-jazzy-simulation:ci" RUN_ID="ci-${GITHUB_RUN_ID}" make security-gate
      - name: Generate SBOM
        run: IMAGE_TAG="robotics/ros-jazzy-simulation:ci" RUN_ID="ci-${GITHUB_RUN_ID}" make sbom
      - name: Generate evidence manifest
        run: IMAGE_TAG="robotics/ros-jazzy-simulation:ci" RUN_ID="ci-${GITHUB_RUN_ID}" make evidence-manifest
      - name: Upload Docker reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: docker-reports
          path: runs/
