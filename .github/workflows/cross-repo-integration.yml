---
name: cross-repo-integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  repository_dispatch:
    types:
      - contracts-ci-success
      - harness-ci-success
  push:
    branches:
      - foundation-ready-v0.2
      - main
    paths:
      - ".github/workflows/cross-repo-integration.yml"
      - "infra/cross-repo/**"
      - "compose.yaml"
      - "Makefile"

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: cross-repo-integration
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout infra
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve pinned SHAs
        id: pins
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          lock = json.loads(Path("infra/cross-repo/stack-lock.json").read_text(encoding="utf-8-sig"))
          for key in ("infra", "contracts", "harness"):
              commit = lock["repositories"][key]["commit"]
              if len(commit) != 40:
                  raise SystemExit(f"invalid {key} commit: {commit}")
          print(f"contracts_sha={lock['repositories']['contracts']['commit']}")
          print(f"harness_sha={lock['repositories']['harness']['commit']}")
          PY

      - name: Require cross-repo token for private checkouts
        run: |
          if [[ -z "${CROSS_REPO_TOKEN}" ]]; then
            echo "CROSS_REPO_TOKEN secret is required for private contracts/harness checkout" >&2
            exit 1
          fi

      - name: Checkout contracts at stack-lock SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: mmkolpakov/robotics-runtime-contracts
          ref: ${{ steps.pins.outputs.contracts_sha }}
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: deps/contracts
          persist-credentials: false

      - name: Checkout harness at stack-lock SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: mmkolpakov/robotics-simulation-harness
          ref: ${{ steps.pins.outputs.harness_sha }}
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: deps/harness
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate contracts package at pinned SHA
        working-directory: deps/contracts
        run: |
          make sync-schemas
          python -m pip install --disable-pip-version-check -e . -r requirements-dev.txt
          make ci

      - name: Validate harness plugin at pinned SHA
        working-directory: deps/harness
        run: |
          python -m pip install --disable-pip-version-check -e . -r requirements-dev.txt
          make validate lint test

      - name: Install infra tools + the pinned harness plugin into .venv
        run: |
          set -euo pipefail
          make bootstrap
          # Installed into the *same* `.venv` `make pytest-docker-smoke`
          # below runs in: proves the pinned harness execution-guard
          # plugin loads cleanly alongside infra's pytest-docker fixtures,
          # not just in harness's own isolated test run above.
          .venv/bin/pip install --disable-pip-version-check --no-deps ./deps/harness
          .venv/bin/python -c "
          from robotics_simulation_harness.guard import enforce_execution_guard
          print('harness guard plugin importable:', enforce_execution_guard)
          "

      - name: Allocate run identity
        id: run
        run: |
          RUN_ID="cross-repo-${GITHUB_RUN_ID}"
          make RUN_ID="${RUN_ID}" prepare-run
          ROS_DOMAIN_ID="$(cat "runs/${RUN_ID}/ros_domain_id.txt")"
          {
            echo "run_id=${RUN_ID}"
            echo "ros_domain_id=${ROS_DOMAIN_ID}"
          } >> "$GITHUB_OUTPUT"

      - name: Build simulation image
        id: image
        run: |
          set -euo pipefail
          IMAGE_CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          IMAGE_SOURCE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
          IMAGE_VERSION="${GITHUB_SHA}" \
          VCS_REF="${GITHUB_SHA}" \
          IMAGE_TAG="robotics/ros-jazzy-simulation:cross-repo" \
          RUN_ID="${{ steps.run.outputs.run_id }}" \
            make compose-build
          digest="$(docker image inspect robotics/ros-jazzy-simulation:cross-repo --format '{{.Id}}')"
          if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected image id format: ${digest}" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Run cross-repo graph readiness (launch_testing_ros)
        env:
          RUN_ID: ${{ steps.run.outputs.run_id }}
          IMAGE_TAG: robotics/ros-jazzy-simulation:cross-repo
        run: make RUN_ID="${RUN_ID}" cross-repo-graph-smoke

      - name: Run integration + joint-motion smokes
        env:
          RUN_ID: ${{ steps.run.outputs.run_id }}
          IMAGE_TAG: robotics/ros-jazzy-simulation:cross-repo
        run: make RUN_ID="${RUN_ID}" integration-smoke joint-motion-smoke

      - name: Run pytest-docker suite with the pinned harness plugin loaded
        env:
          RUN_ID: ${{ steps.run.outputs.run_id }}
          IMAGE_TAG: robotics/ros-jazzy-simulation:cross-repo
        run: make RUN_ID="${RUN_ID}" pytest-docker-smoke

      - name: Assert JUnit reports recorded a real pass
        env:
          RUN_ID: ${{ steps.run.outputs.run_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          run_id = os.environ["RUN_ID"]
          report_dir = Path("runs") / run_id / "reports"
          reports = [
              "cross-repo-graph-ready.xml",
              "integration-smoke.xml",
              "joint-motion-smoke.xml",
              "pytest-docker-smoke.xml",
          ]
          for name in reports:
              path = report_dir / name
              root = ET.fromstring(path.read_text(encoding="utf-8"))
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              failures = int(suite.get("failures", "0"))
              errors = int(suite.get("errors", "0"))
              tests = int(suite.get("tests", "0"))
              assert tests > 0, f"{name}: no tests recorded"
              assert failures == 0 and errors == 0, f"{name}: failures={failures} errors={errors}"
              print(f"{name}: ok ({tests} tests)")
          PY

      - name: Hash JUnit reports + image digest for SLSA provenance
        id: hash
        env:
          RUN_ID: ${{ steps.run.outputs.run_id }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          set -euo pipefail
          report_dir="runs/${RUN_ID}/reports"
          echo "${IMAGE_DIGEST}" > "${report_dir}/image-digest.txt"
          cd "${report_dir}"
          echo "hashes=$(sha256sum \
            cross-repo-graph-ready.xml \
            integration-smoke.xml \
            joint-motion-smoke.xml \
            pytest-docker-smoke.xml \
            image-digest.txt \
            | base64 -w0)" >> "${GITHUB_OUTPUT}"

      - name: Upload cross-repo artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cross-repo-runs
          path: runs/

  provenance:
    needs: [integrate]
    permissions:
      actions: read  # Needed for detection of GitHub Actions environment.
      id-token: write  # Needed for provenance signing.
      contents: write  # Needed to upload provenance to a release, if any.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.integrate.outputs.hashes }}"
      provenance-name: cross-repo.intoto.jsonl
