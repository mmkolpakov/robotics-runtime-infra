---
name: release-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TRIVY_IMAGE: aquasec/trivy:0.72.0@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f

jobs:
  publish:
    name: publish-${{ matrix.id }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: simulation
            target: simulation
            image: simulation
            platforms: linux/amd64
          - id: edge
            target: edge-runtime
            image: edge
            platforms: linux/amd64,linux/arm64
          - id: sensor
            target: sensor-runtime
            image: sensor
            platforms: linux/amd64,linux/arm64
          - id: inference-cpu
            target: inference-cpu
            image: inference-cpu
            platforms: linux/amd64,linux/arm64
          - id: acceptance-observer
            target: acceptance-observer
            image: acceptance-observer
            platforms: linux/amd64,linux/arm64
          - id: benchmark
            target: benchmark-runtime
            image: benchmark
            platforms: linux/amd64,linux/arm64
          - id: evidence-sink
            target: evidence-sink
            image: evidence-sink
            platforms: linux/amd64,linux/arm64
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/robotics-runtime-infra/${{ matrix.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c  # v2.2.0
        with:
          version: v5.3.1
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - name: Set reproducible build metadata
        id: build-metadata
        run: |
          {
            echo "created=$(git show --no-patch --format=%cI HEAD)"
            echo "epoch=$(git show --no-patch --format=%ct HEAD)"
          } >> "$GITHUB_OUTPUT"
      - name: Build and publish image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          outputs: type=image,push=true,rewrite-timestamp=true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            IMAGE_CREATED=${{ steps.build-metadata.outputs.created }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=${{ steps.metadata.outputs.version }}
            SOURCE_DATE_EPOCH=${{ steps.build-metadata.outputs.epoch }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=release-${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.id }}
          provenance: mode=max
          sbom: true
      - name: Verify the published simulation image
        if: matrix.id == 'simulation'
        env:
          SIMULATION_IMAGE: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          project="release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          trap 'docker compose -p "$project" --profile test down --volumes --remove-orphans || true' EXIT
          docker compose -p "$project" pull simulation
          docker compose -p "$project" up --detach --no-build --wait --wait-timeout 120 simulation
          docker compose -p "$project" exec -T simulation \
            robotics-entrypoint timeout 20 ros2 topic echo /clock --once
          docker compose -p "$project" --profile test run --rm --no-deps test
      - name: Scan the published image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PLATFORMS: ${{ matrix.platforms }}
        run: |
          mkdir -p artifacts/security .trivy-cache
          trivy=(
            docker run --rm
            --volume "$HOME/.docker:/root/.docker:ro"
            --volume "$PWD:/work:ro"
            --volume "$PWD/artifacts/security:/reports"
            --volume "$PWD/.trivy-cache:/root/.cache/trivy"
            "$TRIVY_IMAGE" image
            --config /work/trivy.yaml
            --ignorefile /work/.trivyignore
          )
          for platform in ${PLATFORMS//,/ }; do
            platform_id="${platform//\//-}"
            "${trivy[@]}" \
              --platform "${platform}" \
              --format sarif \
              --output "/reports/${{ matrix.id }}-${platform_id}.sarif" \
              "${IMAGE_NAME}@${DIGEST}"
            "${trivy[@]}" \
              --platform "${platform}" \
              --skip-db-update --ignore-unfixed \
              --severity HIGH,CRITICAL --exit-code 1 \
              "${IMAGE_NAME}@${DIGEST}"
          done
      - name: Attest the published image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Verify image attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh attestation verify
          "oci://${IMAGE_NAME}@${DIGEST}"
          --repo "${GITHUB_REPOSITORY}"
      - name: Record immutable image reference
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p artifacts/digests
          printf '%s@%s\n' "${IMAGE_NAME}" "${DIGEST}" \
            > "artifacts/digests/${{ matrix.id }}.txt"
      - name: Upload amd64 scan results
        if: contains(matrix.platforms, 'linux/amd64')
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: artifacts/security/${{ matrix.id }}-linux-amd64.sarif
          category: released-${{ matrix.id }}-linux-amd64
      - name: Upload arm64 scan results
        if: contains(matrix.platforms, 'linux/arm64')
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: artifacts/security/${{ matrix.id }}-linux-arm64.sarif
          category: released-${{ matrix.id }}-linux-arm64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-${{ matrix.id }}-${{ github.ref_name }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

  release:
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          pattern: release-*-${{ github.ref_name }}
          path: release-artifacts
          merge-multiple: true
      - name: Publish release notes and digest records
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## OCI images"
            echo
            for record in release-artifacts/digests/*.txt; do
              printf -- '- \x60%s\x60\n' "$(cat "${record}")"
            done
            echo
            echo "Each image includes BuildKit provenance and an SBOM and has a GitHub artifact attestation."
          } > release-notes.md
          gh release create "${GITHUB_REF_NAME}" \
            release-artifacts/digests/*.txt \
            --verify-tag \
            --title "robotics-runtime-infra ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
