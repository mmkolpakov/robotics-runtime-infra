---
services:
  simulation:
    command:
      - ros2
      - launch
      - robotics_runtime_infra
      - headless.launch.py
      - "gz_args:=-s -v 2"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /usr/local/bin/robotics-entrypoint timeout 5 gz service -l |
          grep -q '^/world/empty/control$'
      interval: 2s
      timeout: 6s
      start_period: 20s
      retries: 15

  simulation-stepper:
    image: "${SIMULATION_IMAGE:-ghcr.io/mmkolpakov/robotics-runtime-infra/simulation:0.5.0}"
    profiles: [stepped]
    init: true
    network_mode: service:simulation
    command:
      - bash
      - -Eeuo
      - pipefail
      - -c
      - |
        while true; do
          gz service \
            --service /world/empty/control \
            --reqtype gz.msgs.WorldControl \
            --reptype gz.msgs.Boolean \
            --timeout 1000 \
            --req 'pause: true, multi_step: 10' >/dev/null
          sleep "${ROBOTICS_STEP_INTERVAL_SEC:-0.01}"
        done
    environment:
      GZ_PARTITION: "${GZ_PARTITION:-robotics-runtime}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      simulation:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /usr/local/bin/robotics-entrypoint timeout 5 gz service -l |
          grep -q '^/world/empty/control$'
      interval: 2s
      timeout: 6s
      start_period: 5s
      retries: 10

  runtime-manifest:
    environment:
      ROBOTICS_TIME_MODE: simulation_stepped
