---
name: robotics-simulation-infra

x-ros-environment: &ros-environment
  ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
  RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
  RCUTILS_COLORIZED_OUTPUT: "1"

x-ros-healthcheck: &ros-healthcheck
  test:
    - CMD-SHELL
    - >-
      bash -lc 'source /etc/profile.d/robotics_ros_setup.sh &&
      ros2 pkg prefix ros_gz_sim >/dev/null &&
      ros2 pkg prefix ros_gz_bridge >/dev/null &&
      ros2 pkg prefix mavros >/dev/null'
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 10s

services:
  simulation:
    image: "${IMAGE_TAG:-robotics/ros-jazzy-simulation:2026-07-05}"
    build:
      context: .
      dockerfile: infra/docker/ros-jazzy-mavros-gazebo.Dockerfile
      network: "${DOCKER_BUILD_NETWORK:-host}"
      args:
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-local}"
        IMAGE_VERSION: "${IMAGE_VERSION:-2026-07-05}"
        VCS_REF: "${VCS_REF:-local}"
    environment:
      <<: *ros-environment
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    volumes:
      - ./config:/workspace/config:ro
      - ./infra/smoke:/workspace/infra/smoke:ro
      - ./launch:/workspace/launch:ro
    healthcheck: *ros-healthcheck

  autopilot-base:
    image: ardupilot/ardupilot-dev-base:v0.2.0
    profiles:
      - autopilot
      - ardupilot
    command: bash -lc "python3 --version && git --version"
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "python3 --version >/dev/null && git --version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3

  px4-sitl:
    image: px4io/px4-sitl-gazebo:v1.18.0-alpha1-amd64
    profiles:
      - autopilot
      - px4
    command: ["-h"]
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace

  dds-agent:
    image: "${DDS_AGENT_IMAGE_TAG:-robotics/dds-agent:2026-07-05}"
    build:
      context: .
      dockerfile: infra/docker/dds-agent.Dockerfile
      network: "${DOCKER_BUILD_NETWORK:-host}"
      args:
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-local}"
        IMAGE_VERSION: "${IMAGE_VERSION:-2026-07-05}"
        VCS_REF: "${VCS_REF:-local}"
    profiles:
      - dds
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          MicroXRCEAgent --help >/dev/null 2>&1 || test "$$?" -eq 1
      interval: 10s
      timeout: 5s
      retries: 3

  comms-bridge:
    image: eclipse/zenoh-bridge-ros2dds:1.9.0
    profiles:
      - comms
    command:
      - --help
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -x /zenoh-bridge-ros2dds ||
          command -v zenoh-bridge-ros2dds >/dev/null
      interval: 10s
      timeout: 5s
      retries: 3

  media-runtime:
    image: "${MEDIA_IMAGE_TAG:-robotics/media-runtime:2026-07-05}"
    build:
      context: .
      dockerfile: infra/docker/media-runtime.Dockerfile
      network: "${DOCKER_BUILD_NETWORK:-host}"
      args:
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-local}"
        IMAGE_VERSION: "${IMAGE_VERSION:-2026-07-05}"
        VCS_REF: "${VCS_REF:-local}"
        RUNTIME_BASE_IMAGE: "${IMAGE_TAG:-robotics/ros-jazzy-simulation:2026-07-05}"
    profiles:
      - media
    environment:
      <<: *ros-environment
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "gst-launch-1.0 --version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3

  diagnostics-runtime:
    image: "${DIAGNOSTICS_IMAGE_TAG:-robotics/diagnostics-runtime:2026-07-05}"
    build:
      context: .
      dockerfile: infra/docker/diagnostics-runtime.Dockerfile
      network: "${DOCKER_BUILD_NETWORK:-host}"
      args:
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-local}"
        IMAGE_VERSION: "${IMAGE_VERSION:-2026-07-05}"
        VCS_REF: "${VCS_REF:-local}"
        RUNTIME_BASE_IMAGE: "${IMAGE_TAG:-robotics/ros-jazzy-simulation:2026-07-05}"
    profiles:
      - diagnostics
    environment:
      <<: *ros-environment
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -lc 'source /etc/profile.d/robotics_ros_setup.sh &&
          ros2 pkg prefix plotjuggler_ros >/dev/null'
      interval: 10s
      timeout: 5s
      retries: 3

  local-render:
    image: "${IMAGE_TAG:-robotics/ros-jazzy-simulation:2026-07-05}"
    profiles:
      - render
    command: bash -lc "test -d /dev/dri && ls -1 /dev/dri"
    devices:
      - /dev/dri:/dev/dri
    environment:
      <<: *ros-environment
      LIBGL_ALWAYS_SOFTWARE: "${LIBGL_ALWAYS_SOFTWARE:-0}"
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "test -d /dev/dri"]
      interval: 10s
      timeout: 5s
      retries: 3

  nvidia-gpu:
    image: nvidia/cuda:12.9.2-base-ubuntu24.04
    profiles:
      - nvidia
    command: nvidia-smi
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

  accelerated-inference:
    image: "${INFERENCE_IMAGE_TAG:-robotics/accelerated-inference:2026-07-05}"
    build:
      context: .
      dockerfile: infra/docker/accelerated-inference.Dockerfile
      network: "${DOCKER_BUILD_NETWORK:-host}"
      args:
        NVIDIA_PYTORCH_BASE_IMAGE: "${NVIDIA_PYTORCH_BASE_IMAGE:-nvcr.io/nvidia/pytorch:26.06-py3}"
        ONNXRUNTIME_GPU_VERSION: "${ONNXRUNTIME_GPU_VERSION:-1.27.0}"
        IMAGE_CREATED: "${IMAGE_CREATED:-unknown}"
        IMAGE_SOURCE: "${IMAGE_SOURCE:-local}"
        IMAGE_VERSION: "${IMAGE_VERSION:-2026-07-05}"
        VCS_REF: "${VCS_REF:-local}"
    profiles:
      - inference
    command:
      - bash
      - -lc
      - >-
        python3 -c "import onnxruntime; import torch; import tensorrt;
        print('torch_cuda_available=' + str(torch.cuda.is_available()));
        raise SystemExit(0 if torch.cuda.is_available() else 1)"
    network_mode: "${COMPOSE_NETWORK_MODE:-host}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import onnxruntime; import torch; import tensorrt;
          raise SystemExit(0 if torch.cuda.is_available() else 1)"
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

  edge-nvidia-arm64:
    image: nvcr.io/nvidia/l4t-jetpack:r36.4.0
    profiles:
      - edge
    # Config-check only on amd64 CI; this image is not built or run as a release gate.
    platform: linux/arm64
    command: bash -lc "uname -m && cat /etc/nv_tegra_release || true"
    healthcheck:
      test: ["CMD-SHELL", "uname -m >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
