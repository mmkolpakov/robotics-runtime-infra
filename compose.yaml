---
x-runtime: &runtime
  image: "${SIMULATION_IMAGE:-ghcr.io/mmkolpakov/droning-simulation-infra:0.4.1}"
  build:
    context: .
    dockerfile: Dockerfile
    args:
      IMAGE_CREATED: "${IMAGE_CREATED:-1970-01-01T00:00:00Z}"
      IMAGE_SOURCE: "${IMAGE_SOURCE:-https://github.com/mmkolpakov/droning-simulation-infra}"
      IMAGE_VERSION: "${IMAGE_VERSION:-0.4.1}"
      VCS_REF: "${VCS_REF:-local}"
  init: true
  environment: &runtime-environment
    GZ_PARTITION: "${GZ_PARTITION:-robotics-simulation}"
    LIBGL_ALWAYS_SOFTWARE: "${LIBGL_ALWAYS_SOFTWARE:-1}"
    RCUTILS_COLORIZED_OUTPUT: "${RCUTILS_COLORIZED_OUTPUT:-1}"
    RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
    ROS_AUTOMATIC_DISCOVERY_RANGE: "${ROS_AUTOMATIC_DISCOVERY_RANGE:-SUBNET}"
    ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
  stop_grace_period: 20s

services:
  simulation:
    <<: *runtime

  test:
    <<: *runtime
    profiles:
      - test
    command:
      - bash
      - -lc
      - |
        status=0
        colcon test \
          --merge-install \
          --packages-select robotics_simulation_infra \
          --event-handlers console_direct+ \
          --return-code-on-test-failure || status=$?
        colcon test-result --verbose || status=$?
        exit "$${status}"
    environment:
      <<: *runtime-environment
      GZ_PARTITION: "${GZ_TEST_PARTITION:-robotics-simulation-test}"
    healthcheck:
      disable: true
