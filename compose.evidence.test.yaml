---
services:
  s3-fixture:
    image: chrislusf/seaweedfs:4.29@sha256:d47c7ee99fcb951351d7194915f4e3a5ea604a8e8871183d713907dec4fb9bf5
    profiles: [test]
    command: [server, -s3, -dir=/data, -s3.port=8333]
    environment:
      AWS_ACCESS_KEY_ID: robotics-test
      AWS_SECRET_ACCESS_KEY: robotics-test-secret
    healthcheck:
      disable: true

  s3-fixture-init:
    image: "${EVIDENCE_IMAGE:-ghcr.io/mmkolpakov/robotics-runtime-infra/evidence-sink:0.5.0}"
    profiles: [test]
    entrypoint: [/bin/bash, -c]
    command:
      - |
        set -eu
        until aws --endpoint-url http://s3-fixture:8333 s3api list-buckets >/dev/null 2>&1; do
          sleep 1
        done
        aws --endpoint-url http://s3-fixture:8333 s3api create-bucket \
          --bucket robotics-evidence
        aws --endpoint-url http://s3-fixture:8333 s3api put-bucket-versioning \
          --bucket robotics-evidence \
          --versioning-configuration Status=Enabled
    depends_on:
      s3-fixture:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: robotics-test
      AWS_DEFAULT_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: robotics-test-secret
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      disable: true

  evidence-finalize:
    depends_on:
      s3-fixture-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: robotics-test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://s3-fixture:8333
      AWS_SECRET_ACCESS_KEY: robotics-test-secret
      EVIDENCE_BUCKET: robotics-evidence
      EVIDENCE_MODE: s3
      EVIDENCE_PREFIX: regression-30d
      RCLONE_CONFIG_EVIDENCE_ACCESS_KEY_ID: robotics-test
      RCLONE_CONFIG_EVIDENCE_ENDPOINT: http://s3-fixture:8333
      RCLONE_CONFIG_EVIDENCE_FORCE_PATH_STYLE: "true"
      RCLONE_CONFIG_EVIDENCE_PROVIDER: Other
      RCLONE_CONFIG_EVIDENCE_SECRET_ACCESS_KEY: robotics-test-secret
      RCLONE_CONFIG_EVIDENCE_TYPE: s3
      RCLONE_REMOTE: evidence
      ROBOTICS_RETENTION_CLASS: regression-30d
      ROBOTICS_RUN_ID: org.example.s3-evidence
